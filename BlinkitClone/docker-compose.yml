version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: blinkit-mysql
    environment:
      MYSQL_DATABASE: blinkit_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - blinkit-network

  redis:
    image: redis:7.0-alpine
    container_name: blinkit-redis
    ports:
      - "6379:6379"
    networks:
      - blinkit-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blinkit-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=blinkit_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=smtp.mailtrap.io
      - SMTP_PORT=2525
      - SMTP_USERNAME=your_smtp_username
      - SMTP_PASSWORD=your_smtp_password
    depends_on:
      - mysql
      - redis
    networks:
      - blinkit-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blinkit-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - blinkit-network

volumes:
  mysql-data:

networks:
  blinkit-network:
    driver: bridge
