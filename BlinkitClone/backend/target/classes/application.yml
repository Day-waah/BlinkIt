server:
  port: 8080

spring:
  application:
    name: blinkit-clone-api
  
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:blinkit_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: QN9V3X1DX
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${SMTP_HOST:smtp.mailtrap.io}
    port: ${SMTP_PORT:2525}
    username: ${SMTP_USERNAME:mock-username}
    password: ${SMTP_PASSWORD:mock-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: 9a65632d2f3b392476566d59647037722f7535782f413d3d # 256-bit key in hex (mock/dev secret)
    expiration-ms: 86400000 # 24 hours
    refresh-expiration-ms: 604800000 # 7 days

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
